<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminGuru AI - Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-600">
        <h2 class="text-3xl font-bold text-slate-800 text-center mb-2">AdminGuru AI 🤖</h2>
        <p class="text-sm text-slate-500 text-center mb-4 italic">Pembelajaran Mendalam dan Berbasis Cinta</p>
        
        <div class="bg-blue-50 p-3 rounded-lg mb-6 text-xs text-blue-800">
            <strong>Cara pakai:</strong><br>
            1. Buka <a href="https://aistudio.google.com/app/apikey" target="_blank" class="underline font-bold">Google AI Studio</a>.<br>
            2. Klik "Create API Key" lalu Copy kuncinya.<br>
            3. Tempel di kotak bawah ini.
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">1. API Key Gemini</label>
                <input type="password" id="userKey" 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Tempel kunci AIzaSy... di sini">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">2. Perintah (Prompt)</label>
                <textarea id="userPrompt" rows="4" 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Contoh: Buat modul ajar Fisika kelas 10..."></textarea>
            </div>

            <button onclick="panggilAI()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-all">
                Proses Sekarang
            </button>
        </div>

        <div class="mt-8">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Hasil:</label>
            <div id="output" class="bg-slate-50 p-4 rounded-lg border border-slate-200 text-sm text-slate-800 min-h-[100px] whitespace-pre-wrap">Hasil akan muncul di sini...</div>
        </div>
    </div>

<script>
async function panggilAI() {
    const keyInput = document.getElementById('userKey').value.trim();
    const promptInput = document.getElementById('userPrompt').value;
    const outputDiv = document.getElementById('output');

    if (!keyInput) { alert("Masukkan API Key!"); return; }
    if (!promptInput) { alert("Masukkan perintah!"); return; }

    outputDiv.innerText = "Sedang menghubungi Google AI...";

    // Menggunakan model 2.5 flash yang stabil
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keyInput}`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ 
                    parts: [{ 
                        text: "Kamu adalah asisten AdminGuru AI. Tugasmu membantu guru membuat perangkat ajar yang Mindful, Joyful, dan Meaningful dan berbasis Panca cita. Jawablah permintaan ini: " + promptInput 
                    }]
                }]
            })
        });

        const data = await response.json();

        if (data.error) {
            outputDiv.innerText = "Google Berkata: " + data.error.message;
        } else if (data.candidates && data.candidates[0].content.parts[0].text) {
            outputDiv.innerText = data.candidates[0].content.parts[0].text;
        } else {
            outputDiv.innerText = "Respon kosong, silakan coba lagi.";
        }
    } catch (error) {
        outputDiv.innerText = "Terjadi kesalahan koneksi. Periksa internet Anda.";
    }
}
</script>
</body>
</html>
